<!DOCTYPE html>
<html>
<head>
    <title>AI Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>AI Study Planner</h1>

    <form action="/generate" method="post">
        <input type="text" name="subjects" placeholder="Subjects (Math, Physics)" required>
        <input type="text" name="exam_dates" placeholder="Exam Dates" required>
        <input type="text" name="weak_topics" placeholder="Weak Topics" required>

        <button type="submit">Generate Plan</button>
    </form>

    {% if plan %}
        <div class="result">
            <h2>Your Study Plan</h2>
            <ul>
                {% for item in plan %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
</div>

</body>
</html>
